services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hospital_capacity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hospital_capacity"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - hospital_capacity_postgres:/var/lib/postgresql/data

volumes:
  hospital_capacity_postgres:

name: dbt-check

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demos/healthcare-capacity
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: hospital_capacity
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hospital_capacity"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/hospital_capacity
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hospital_capacity
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python etl/synthetic_data_generator/generate_fake_data.py
      - run: python etl/synthetic_data_generator/load_to_postgres.py
      - run: pytest tests/python
      - name: Configure dbt profile
        run: cp sql/dbt_hospital_capacity/profiles.yml.example sql/dbt_hospital_capacity/profiles.yml
      - name: Build dbt project
        working-directory: demos/healthcare-capacity/sql/dbt_hospital_capacity
        run: dbt build --profiles-dir .
        env:
          DBT_PROFILES_DIR: .
